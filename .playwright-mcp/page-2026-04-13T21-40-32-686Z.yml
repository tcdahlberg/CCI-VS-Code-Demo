                  - /url: https://alumni.stthomas.edu/benefits-resources/faith-spirituality/index.html
              - paragraph
              - paragraph [ref=e83]: Rooted in the Catholic intellectual tradition, St. Thomas invites alumni to stay connected through opportunities for faith, reflection and service — living out our mission in community with fellow Tommies.
              - paragraph
          - generic [ref=e84]:
            - img "Alumni toasting cheers at a pregame social" [ref=e86]
