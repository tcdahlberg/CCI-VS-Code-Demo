            - paragraph [ref=e129]: Show your St. Thomas pride while making a difference! Through the Minnesota Collegiate Plate program, you can sport branded license plates and support Tommie scholarships.
          - generic [ref=e130]:
            - heading "Tommie Business Directory" [level=3] [ref=e131]
            - generic [ref=e132]:
