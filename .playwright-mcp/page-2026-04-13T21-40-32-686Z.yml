      - generic [ref=e111]:
        - heading "Exclusive Alumni Perks" [level=2] [ref=e113]
        - generic [ref=e114]:
          - generic [ref=e115]:
            - heading "Financial Benefits from U.S. Bank" [level=3] [ref=e116]:
              - link "Financial Benefits from U.S. Bank" [ref=e117] [cursor=pointer]:
                - /url: https://alumni.stthomas.edu/benefits-resources/financial/index.html
            - paragraph [ref=e119]: St. Thomas partners with U.S. Bank to help you elevate your financial wellness. As a member of the St. Thomas alumni community, you have exclusive access to tools, tips, resources and rewards.
          - generic [ref=e120]:
            - heading "Alumni Insurance Program" [level=3] [ref=e121]:
              - link "Alumni Insurance Program" [ref=e122] [cursor=pointer]:
                - /url: "https://www.alumniinsuranceprogram.com/stthomas/ "
            - paragraph [ref=e124]: St. Thomas is pleased to offer the Alumni Insurance Program to all alumni. Administered by USI Insurance Services, the program includes offerings such as health, life, auto, home and travel insurance.
          - generic [ref=e125]:
            - heading "St. Thomas-branded License Plates" [level=3] [ref=e126]:
              - link "St. Thomas-branded License Plates" [ref=e127] [cursor=pointer]:
