                  - /url: https://alumni.stthomas.edu/benefits-resources/continuing-education/index.html
              - paragraph
              - paragraph [ref=e76]: From webinars and professional development to certificate and graduate programs, St. Thomas offers endless ways to keep learning and expanding your horizons.
              - paragraph
          - generic [ref=e77]:
            - img "Students pray in Chapel of St. Thomas Aquinas" [ref=e79]
            - generic [ref=e80]:
              - heading "Faith & Spirituality" [level=3] [ref=e81]:
