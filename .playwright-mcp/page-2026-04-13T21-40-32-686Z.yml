              - paragraph
              - paragraph [ref=e90]: Stay connected through events that bring Tommies together to network, learn, celebrate and show your St. Thomas pride — on campus and beyond.
              - paragraph
      - generic [ref=e93]:
        - generic [ref=e100]:
          - generic [ref=e101]:
            - paragraph [ref=e102]: Network & Mentor
            - heading "St. Thomas Connect" [level=2] [ref=e103]
            - paragraph [ref=e104]: This is one of our most powerful tools for alumni at all stages of life — whether you're giving back, building your network, or both.
            - paragraph [ref=e105]: St. Thomas Connect makes it easy to mentor students or fellow alumni, share career insights, grow your professional network, or reconnect with old classmates. You can also find a mentor for yourself. With new members joining all the time, there's always an opportunity to make a meaningful impact.
          - link "Join St. Thomas Connect" [ref=e107] [cursor=pointer]:
