          - generic [ref=e307]:
            - heading "LWR Sites for Experience Cloud" [level=1] [ref=e308]
            - generic [ref=e309]:
              - generic [ref=e310]:
                - text: Develop sites that load quickly and scale well using the
                - term [ref=e311]: Build Your Own (LWR)
                - text: and
                - term [ref=e312]: Microsite (LWR)
                - text: templates for Experience Cloud. Based on the Lightning Web Runtime (LWR) and the Lightning Web Components (LWC) programming model, these lightweight templates support fully custom solutions and deliver exceptional site performance.
              - paragraph [ref=e313]: This guide outlines the steps required to successfully develop and deploy LWR-based experiences, and explains how to create Lightning web components for the templates, build page and theme layouts, and enable various custom solutions.
            - list [ref=e315]:
              - listitem [ref=e316]:
                - strong [ref=e317]:
                  - link "What Are LWR Sites for Experience Cloud?" [ref=e318] [cursor=pointer]:
                    - /url: /docs/atlas.en-us.exp_cloud_lwr.meta/exp_cloud_lwr/intro_overview.htm
                - text: Powered by the Lightning Web Runtime (LWR), LWR sites deliver unparalleled site performance and improve developer productivity. The Build Your Own (LWR) and the Microsite (LWR) templates for Experience Cloud let you develop blazing fast digital experiences, such as websites, portals, and microsites, using the Lightning Web Components programming model.
              - listitem [ref=e319]:
                - strong [ref=e320]:
                  - link "Before You Begin Building an LWR Site" [ref=e321] [cursor=pointer]:
                    - /url: /docs/atlas.en-us.exp_cloud_lwr.meta/exp_cloud_lwr/intro_before.htm
                - text: Build Your Own (LWR) is a minimal template in Experience Cloud that provides only the most essential pages and components, so to build a functioning site, you need to add your own custom pages and components. Therefore, this template is best suited for developers who are comfortable developing Lightning web components and working with Salesforce DX, User Interface API, and Apex. The Microsite (LWR) template includes a responsive layout, preconfigured pages, and content components that you can use to quickly spin up a landing page, event site, or other web experience. Depending on your use case, the template doesn’t necessarily require much additional customization.
              - listitem [ref=e322]:
                - strong [ref=e323]:
                  - link "Key Resources for Developing LWR Sites" [ref=e324] [cursor=pointer]:
                    - /url: /docs/atlas.en-us.exp_cloud_lwr.meta/exp_cloud_lwr/intro_resources.htm
                - text: Check out these resources to learn more about the main elements you use when developing an LWR site in Experience Cloud.
              - listitem [ref=e325]:
                - strong [ref=e326]:
                  - link "Release Notes for LWR Sites" [ref=e327] [cursor=pointer]:
                    - /url: /docs/atlas.en-us.exp_cloud_lwr.meta/exp_cloud_lwr/intro_release_notes.htm
                - text: Use the Salesforce Release Notes to learn about the most recent updates and changes to LWR sites for Experience Cloud.
